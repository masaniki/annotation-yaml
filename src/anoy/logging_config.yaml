version: 1
formatters:
  default:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  simple:
    format: "%(name)s - %(levelname)s - %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
  # file:
  #   class: logging.FileHandler
  #   level: DEBUG
  #   formatter: simple
  #   filename: "myLog.txt"
  #   mode: "w"
root:
  level: INFO
  handlers: [console]