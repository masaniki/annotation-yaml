version: 1
formatters:
  default:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  simple:
    format: "%(name)s - %(levelname)s - %(message)s"
handlers:
  testFile:    #自動testの結果をfileで出力。
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: "tests/invalid_anoy/testsuite/output_log.txt"
    mode: "w"
root:
  level: INFO
  handlers: [testFile]